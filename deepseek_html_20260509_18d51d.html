<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>一封手写信</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d2c8b5;  /* 桌面木纹感 */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", "Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    /* 优先使用系统自带楷体，其次加载 Google 手写字体 */
  }

  /* 信纸容器 */
  .letter-paper {
    background: #fdf8f0;
    width: 100%;
    max-width: 360px;
    padding: 40px 28px 50px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    border-radius: 2px;
    position: relative;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 29px,
      #d7ccc8 29px,
      #d7ccc8 30px
    ); /* 横线纸效果，30px行高 */
    background-size: 100% 30px;
    line-height: 30px;
    color: #3e3a37;
    font-size: 18px;
    letter-spacing: 1px;
  }

  /* 顶部装饰红条 */
  .letter-paper::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #c1796b;
  }

  /* 信件内容区域 */
  .content {
    margin-top: 10px;
  }

  .content p {
    text-indent: 2em;  /* 首行缩进 */
    margin-bottom: 8px;
  }

  .signature {
    text-align: right;
    margin-top: 25px;
    font-size: 20px;
    font-weight: bold;
  }

  .date {
    text-align: right;
    font-size: 16px;
    color: #7b6e63;
    margin-top: 5px;
  }

  /* 手写风格增强：轻微倾斜和随机感（仅视觉） */
  .content p:nth-child(odd) {
    transform: rotate(-0.2deg);
  }
  .content p:nth-child(even) {
    transform: rotate(0.3deg);
  }
</style>
</head>
<body>

<div class="letter-paper">
  <!-- ========== 在这里修改你的信件内容 ========== -->
  <div class="content">
    <p>亲爱的朋友：</p>
    <p>见字如面。</p>
    <p>很久没有用笔写信了，今天忽然想念那种纸张摩挲手指的感觉，于是提笔写下这些字。</p>
    <p>日子不紧不慢地过着，窗外的梧桐叶已经开始飘落，今年秋天来得格外温柔。前几天路过以前常去的那家书店，店主居然还记得我，问起你最近可好。</p>
    <p>我笑了笑说，她一定也在某处安静地生活着，和我一样偶尔想起老朋友。</p>
    <p>盼回信，哪怕只是三言两语，知道彼此安好就足够了。</p>
    <p>祝好。</p>
  </div>
  <div class="signature">你的老友</div>
  <div class="date">2026年5月9日</div>
  <!-- ========== 修改结束 ========== -->
</div>

</body>
</html>
